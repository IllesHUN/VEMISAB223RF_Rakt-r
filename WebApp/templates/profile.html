{% extends 'base.html' %}
{% block title %}- Profil{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="page-header">
        <h1>Profilom</h1>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 20px;">Személyes adatok módosítása</h3>

        <form method="POST">
            <div class="form-group">
                <label>Teljes név</label>
                <input type="text" name="name" value="{{ user.name }}" required>
            </div>

            <div class="form-group">
                <label>Email cím</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="form-group">
                <label>Telefonszám</label>
                <input type="text" name="phone" value="{{ user.phone or '' }}" placeholder="+36 30 123 4567">
            </div>

            <div class="form-group">
                <label>Szerepkör</label>
                <input type="text" value="{{ user.role }}" disabled
                       style="background: #2d2d2d; color: #adb5bd; cursor: not-allowed;">
            </div>

            <div class="form-group">
                <label>Regisztráció dátuma</label>
                <input type="text" value="{{ user.created_at.strftime('%Y-%m-%d %H:%M') }}" disabled
                       style="background: #2d2d2d; color: #adb5bd; cursor: not-allowed;">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;">
                Adatok mentése
            </button>
        </form>
    </div>
</div>
{% endblock %}
